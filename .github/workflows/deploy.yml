name: Deploy to Strato

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            open -u '${{ secrets.SSH_USER }}','${{ secrets.SSH_PASS }}' sftp://${{ secrets.SSH_HOST }};
            mirror --reverse --delete --verbose out/ ${{ secrets.SSH_DIR }};
            bye
          "
